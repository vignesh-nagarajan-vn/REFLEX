# Adversariality sweep: run RRM across a grid of alpha and build the phase
# diagram locating the critical alpha* where the empirical contraction modulus
# L_hat crosses 1 (stable -> divergent).
#
# `base` mirrors the single-run config (kept small for CPU); `sweep` lists the
# grid + number of seeds. Each (alpha, seed) cell runs a full RRM trajectory.
base:
  seed: 0
  device: cpu
  dtype: float32
  bonds:
    n_bonds: 6
    n_sectors: 2
  clients:
    alpha: 0.15
    base_arrival_rate: 1.0
    demand_elasticity: 1.5
    info_signal_noise: 0.6
    info_intensity: 1.4
    info_cap: 2.5
    toxicity_feedback: 0.22
    spread_ref: 0.5
  simulator:
    horizon: 40
    fundamental_vol: 0.10
    impact: 0.30
    mid_reversion: 0.10
    mid_move_cap: 4.0
  operator:
    hidden: 48
    head_type: gaussian
    lr: 0.001
    epochs: 40
    patience: 6
  policy:
    type: linear
    lr: 0.03
    inner_steps: 40
    rollout_horizon: 12
    n_rollouts: 12
    init_half_spread: 0.8
  reward:
    inv_risk_weight: 0.05
  stability:
    lipschitz_w: 0.0
  rrm:
    max_iters: 12
    tol: 0.001
    n_episodes: 16
    eval_episodes: 10

sweep:
  alpha_grid: [0.05, 0.15, 0.25, 0.35, 0.45, 0.55, 0.65, 0.80]
  n_seeds: 3
  seed_base: 100
