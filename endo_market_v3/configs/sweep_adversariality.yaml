# SECONDARY (documented-confound) sweep: the adversariality alpha.
#
# Sweeping alpha is confounded by design (theory 1.1 Section 6.4): it moves
# both the feedback slope epsilon (numerator) and the operating regime /
# fixed point (the dealer widens into the low-curvature region), so the net
# modulus trend flattens or reverses -- a reported finding, not the headline
# result.  Use sweep_feedback.yaml for the clean control variable.
#
# v3 spec format: the sweep probes the CRN BR-slope modulus at h_ref per
# (value, seed) cell; the closed-form overlay is evaluated at the same h_ref.
seed: 0
device: cpu
dtype: float32

base:
  bonds:
    n_bonds: 8
    n_sectors: 2
  clients:
    alpha: 0.5
    info_intensity: 1.4
    info_base_intensity: 0.6
    info_spread_decay: 1.5
    info_cap: 8.0
    toxicity_feedback: 5.0
    spread_ref: 0.5
  simulator:
    horizon: 40
    fundamental_vol: 0.25
    init_mispricing_vol: 0.5
    mid_move_cap: 4.0
  operator:
    hidden: 64
    head_type: gaussian
    epochs: 50
  policy:
    type: linear
    inner_steps: 60
    rollout_horizon: 16
    n_rollouts: 16
    init_half_spread: 0.8
  reward:
    inv_risk_weight: 0.05
    quote_anchor_weight: 0.25
    quote_anchor_ref: 1.0
  rrm:
    n_episodes: 16

sweep:
  variable: alpha
  grid: [0.05, 0.15, 0.25, 0.35, 0.45, 0.55, 0.65, 0.80]
  n_seeds: 5
  seed_base: 100
  h_ref: 1.0
  delta: 0.25
